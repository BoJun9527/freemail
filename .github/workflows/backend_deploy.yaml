name: Deploy Backend

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false

      - name: Deploy Backend for ${{ github.ref_name }}
        run: |
          export debug_mode=${{ secrets.DEBUG_MODE }}

          # Write wrangler.toml from secret
          printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml

          pnpm install --no-frozen-lockfile

          if [ "$debug_mode" = "true" ]; then
            pnpm wrangler deploy
          else
            if pnpm wrangler deploy >/dev/null 2>&1; then
              echo "Deploy succeeded"
            else
              code=$?
              echo "Command failed with exit code $code"
              exit "$code"
            fi
          fi
          echo "Deployed for ${{ github.ref_name }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
